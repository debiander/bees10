<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEES10 | Biblioteca Escolar de la EES10 | Claromecó</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Inter:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --accent: #3b82f6;
            --text: #ffffff;
            --muted: #666666;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 2rem;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 4rem;
            letter-spacing: -2px;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        p {
            font-size: 1.1rem;
            color: var(--muted);
            line-height: 1.6;
            max-width: 450px;
            margin: 0 auto;
        }

        .loader {
            width: 40px;
            height: 4px;
            background: #111;
            margin: 2rem auto;
            position: relative;
            overflow: hidden;
        }

        .loader::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 100%;
            background: var(--accent);
            animation: slide 1.5s infinite ease-in-out;
        }

        @keyframes slide {
            0% {
                left: -20px;
            }

            100% {
                left: 40px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Sitio web de la Biblioteca de la EES10</h1>
        <p>¡Pronto!</p>
        <div class="loader"></div>
    </div>
</body>

</html>
